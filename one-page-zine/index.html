<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; object-src 'none'; base-uri 'self';" />
  <title>One Page Zine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <main>
    <header>
      <h1>One Page Zine</h1>
      <p>Upload 8 pages to generate your zine</p>
    </header>

    <section class="grid" id="grid">
      <!-- 8 upload slots generated by JS -->
    </section>

    <div class="count-wrap">
      <span class="count" id="count">0 / 8 pages uploaded</span>
    </div>
    <div class="buttons">
      <button id="downloadBtn" disabled aria-label="Download zine as PDF">Download Zine PDF</button>
      <button id="downloadImgBtn" disabled aria-label="Download zine as image">Download Zine Image</button>
      <button id="clearAllBtn" aria-label="Clear all uploaded images">Clear All</button>
    </div>
  </main>

  <canvas id="canvas" style="display:none"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
          integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPgnpkI4DNTlrdUmTzrDgektczlKNRRhy5X5AAOnx5S09ydFYWWNSfcEqDTTHgtNA=="
          crossorigin="anonymous"></script>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
